# Redirect all HTTP traffic to HTTPS, except ACME challenge
server {
    listen 80;
    server_name veztra-test.in www.veztra-test.in;

    # Allow Certbot to validate domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name veztra-test.in www.veztra-test.in;

    ssl_certificate /etc/letsencrypt/live/veztra-test.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veztra-test.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy to EverShop app container
    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
