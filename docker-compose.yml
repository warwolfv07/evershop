version: "3.9"

services:
  app:
    image: evershop-app:latest
    container_name: evershop-app
    restart: unless-stopped
    environment:
      DB_HOST: 10.0.2.4
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
    expose:
      - "3000"                # expose internally, not on host
    networks:
      - myevershop

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - myevershop

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: sh -c "trap exit TERM; while :; do sleep 3600; done"
    networks:
      - myevershop

networks:
  myevershop:
    name: MyEverShop
    driver: bridge
