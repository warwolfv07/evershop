# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - VeztraTestApp

on:
  push:
    branches:
      - test
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install root dependencies
        working-directory: .
        run: npm install

      - name: Install and compile postgres-query-builder
        working-directory: ./packages/postgres-query-builder
        run: |
          npm install
          npm run compile

      - name: Compile full project
        working-directory: .
        run: |
          npm run compile:tsc
          npm run build --if-present  
          npm run test --if-present

      - name: Debug - check if .evershop exists
        run: ls -la .evershop || echo "No .evershop folder built"
      
      - name: Rename .evershop to evershop
        run: mv .evershop evershop

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-folder
          path: |
            evershop
            node_modules
            packages
            public
            config
            package.json
            index.js
            next.config.js
            tsconfig.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-folder
          path: deploy/
      
      
      - name: List contents of deploy folder
        run: |
          echo "Deploy folder contents:"
          ls -la deploy/

      - name: Rename evershop back to .evershop
        run: mv deploy/evershop deploy/.evershop

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_102FB3AFD65A4446B16050EBF64B70F8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_05BF1094D3A24B5A981A1591D93AD1DD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6C457F9B3D6445C9A02366B1B46A77C0 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'VeztraTestApp'
          slot-name: 'Production'
          package: ./deploy
          